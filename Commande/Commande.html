    <title>Commande</title>
</head>
<body>
    <!--NavBar CléFitNutrition-->
    <header class="NavBarNutrition">
        <a href="../index.html" class="Logo-Nutrition">
            <img src="../Pictures/542386526_17842046856574827_8310056253357928201_n.jpg" alt="LogoCléFitNutrition">
        </a>  

        <!--Liens du menu-->    
        <nav class="menu-items" id="nav-links">                      
            <a href="../Produits/Produits.html">Produits</a>
            <a href="../Commande/Commande.html" class="cart-link">
                Commande
                <span id="cart-badge">0</span>
            </a>             
            <a href="../Contact/Contact.html">Contact</a>
            <span class="Dark-Light-Mode" id="Dark-Light-Mode" onclick="ChangeToDarkMod()">🌙</span>
        </nav>


        <!--Menu Hamburger Mobile -->
        <div class="Menu-Hamburger" id="hamburger">
            <span></span><span></span><span></span>
        </div>
    </header>

    <h2>Informations client</h2>

    <form id="order-form">
        <input type="text" id="nom" name="nom" placeholder="Nom" required>
        <input type="text" id="prenom" name="prenom" placeholder="Prénom" required>
        <input type="text" id="adresse" name="adresse" placeholder="Adresse" required>
        <input type="email" id="email" name="email" placeholder="Email" required>
        <input type="tel" id="telephone" name="telephone" placeholder="Téléphone" pattern="[0-9]{10}"required>
        <button type="submit">Envoyer la commande</button>
        <button type="button" onclick="clearCart()">Vider le panier</button>
    </form>
    <div id="cart"></div>

<div id="order-message" class="order-message">
    Votre commande a bien été envoyée !
</div>

<div id="order-messageEmptyCart" class="order-messageEmptyCart">
    Votre panier est vide
</div>

<button id="download-pdf" style="display:none;">
  Télécharger le récapitulatif PDF
</button>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="../Common.js"></script>
</body>
</html>
